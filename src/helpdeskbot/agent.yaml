kind: hosted
name: helpdeskbot
description: A deterministic HelpdeskBot for demonstrating safe and vulnerable tool routing.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Observability
    - Responses Protocol
protocols:
  - protocol: responses
    version: 2.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: HELPDESKBOT_MODE
    value: ${HELPDESKBOT_MODE:=safe}
  - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
    value: ${OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT:=false}

