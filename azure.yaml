# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: agentops-observability-demo
services:
    ai-project:
        host: azure.ai.project
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4-mini
                version: "2026-03-17"
              name: gpt-5.4-mini
              sku:
                capacity: 10
                name: GlobalStandard
    helpdeskbot:
        project: src/helpdeskbot
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: A deterministic HelpdeskBot for demonstrating safe and vulnerable tool routing.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: HELPDESKBOT_MODE
              value: ${HELPDESKBOT_MODE:=safe}
            - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
              value: ${OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT:=false}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Observability
                - Responses Protocol
        name: helpdeskbot
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
